name: Deploy Docs

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build:
    name: build
    uses: ./.github/workflows/buildDocs.yml

  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/build/html

      - name: Deploy to pages
        uses: actions/deploy-pages@v5
